<body style="background-color: #0a0a0a; margin: 0; min-height: 100vh; display: flex; flex-direction: column;">
  <div id="root">
    <!-- Initial Loader before React mounts -->
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
      <div
        style="width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top-color: #a78bfa; animation: spin 1s ease-in-out infinite;">
      </div>
    </div>
    <style>
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
